name: Build

on: push

jobs:
  build:
    runs-on: debian-12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run:
          sudo apt-get install
            build-essential
            libgdome2-dev
            libreadline-dev

      - name: make
        run: make

      - name: Store test results
        if: success() || failure()
        uses: actions/upload-artifact@v3
        with:
          name: test-suite.log
          path: tests/test-suite.log
          if-no-files-found: error
